services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: networth
      POSTGRES_USER: networth
      POSTGRES_PASSWORD: networth
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U networth"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://networth:networth@db:5432/networth
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
